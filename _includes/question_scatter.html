<div class="quiz-container" style="border: 2px solid #222; padding: 25px; margin: 20px 0; border-radius: 10px; background: #fff;">
  <h3>{{ include.title }}</h3>
  <p>{{ include.instruction }}</p>

  <!-- THE DATA TABLE (The "Source") -->
  <table style="width: 250px; border-collapse: collapse; margin-bottom: 20px;" border="1">
    <thead><tr style="background: #eee;"><th>Point</th><th>X</th><th>Y</th></tr></thead>
    <tbody id="task-{{ include.id }}" style="text-align: center;"></tbody>
  </table>

  <div style="display: flex; flex-wrap: wrap; gap: 30px;">
    <!-- THE GRID -->
    <div>
      <div id="grid-{{ include.id }}" class="jxgbox" style="width:350px; height:350px; border: 1px solid #ccc;"></div>
      <p><small><em>Click the grid to add a point. Drag points to move them.</em></small></p>
    </div>

    <!-- THE ACCESSIBLE ENTRY & "YOUR PLOTS" LIST -->
    <div style="flex: 1; min-width: 280px;">
      <div style="padding: 15px; background: #f0f7ff; border: 1px solid #0056b3; border-radius: 8px; margin-bottom: 15px;">
        <strong>Add Point (Keyboard Entry):</strong><br>
        X: <input type="number" id="manualX-{{ include.id }}" style="width:45px;"> 
        Y: <input type="number" id="manualY-{{ include.id }}" style="width:45px;">
        <button id="addBtn-{{ include.id }}">Add to Grid</button>
      </div>

      <strong>Your Current Plots:</strong>
      <table style="width: 100%; border-collapse: collapse; margin-top: 5px;" border="1">
        <thead><tr style="background: #eee;"><th>Label</th><th>X</th><th>Y</th><th>Action</th></tr></thead>
        <tbody id="user-{{ include.id }}" style="text-align: center;"></tbody>
      </table>
      
      <button id="check-{{ include.id }}" style="width:100%; margin-top: 20px; padding: 10px; background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer;">Submit Quiz</button>
      <p id="msg-{{ include.id }}" aria-live="polite" style="margin-top: 10px; font-weight: bold;"></p>
    </div>
  </div>
</div>

<script>
(function() {
  const id = "{{ include.id }}";
  const targetPoints = "{{ include.points }}".split('|').map(p => p.split(',').map(n => parseFloat(n.trim())));
  const board = JXG.JSXGraph.initBoard('grid-'+id, {boundingbox: [-1, 11, 11, -1], axis: true, showCopyright: false});
  
  // Fill the "Source" table
  const taskBody = document.getElementById('task-'+id);
  targetPoints.forEach((p, i) => {
    taskBody.innerHTML += `<tr><td>${i+1}</td><td>${p[0]}</td><td>${p[1]}</td></tr>`;
  });

  let userPoints = [];
  const userTable = document.getElementById('user-'+id);

  function updateTable() {
    userTable.innerHTML = "";
    userPoints.forEach((p, i) => {
      userTable.innerHTML += `<tr><td>${i+1}</td><td>${p.X()}</td><td>${p.Y()}</td>
        <td><button onclick="removePoint${id}(${i})">Remove</button></td></tr>`;
    });
  }

  // Handle adding a point
  function addPoint(x, y) {
    if (userPoints.length >= targetPoints.length) {
      alert("You have already plotted all required points.");
      return;
    }
    const p = board.create('point', [x, y], {name: (userPoints.length + 1).toString(), snapToGrid: true, snapSizeX: 1, snapSizeY: 1});
    p.on('drag', updateTable);
    userPoints.push(p);
    updateTable();
  }

  // Mouse Click interaction
  board.on('down', function(e) {
    if (e.button === 2) return; // Ignore right click
    const coords = board.getUsrCoordsOfMouse(e);
    addPoint(Math.round(coords[0]), Math.round(coords[1]));
  });

  // Keyboard button interaction
  document.getElementById('addBtn-'+id).onclick = () => {
    const x = parseFloat(document.getElementById('manualX-'+id).value);
    const y = parseFloat(document.getElementById('manualY-'+id).value);
    if (!isNaN(x) && !isNaN(y)) addPoint(x, y);
  };

  // Remove point function (global so HTML can see it)
  window["removePoint" + id] = (index) => {
    board.removeObject(userPoints[index]);
    userPoints.splice(index, 1);
    // Re-index names
    userPoints.forEach((p, i) => p.setAttribute({name: (i+1).toString()}));
    updateTable();
  };

  // Check Results
  document.getElementById('check-'+id).onclick = () => {
    const msg = document.getElementById('msg-'+id);
    if (userPoints.length < targetPoints.length) {
      msg.innerText = "Please plot all " + targetPoints.length + " points.";
      return;
    }
    
    // Logic: Match any user point to any target point (order doesn't matter)
    let score = 0;
    let targets = [...targetPoints];
    userPoints.forEach(up => {
      const matchIdx = targets.findIndex(tp => tp[0] === up.X() && tp[1] === up.Y());
      if (matchIdx > -1) {
        score++;
        targets.splice(matchIdx, 1);
      }
    });

    if (score === targetPoints.length) {
      msg.innerText = "✅ Perfect! All points are correctly scribed.";
      msg.style.color = "green";
    } else {
      msg.innerText = "❌ Not quite. You have " + score + " out of " + targetPoints.length + " correct.";
      msg.style.color = "red";
    }
  };
})();
</script>
